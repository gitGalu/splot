name: Build (manual)

# Manual cross-platform build. Produces installer artifacts you can download
# from the workflow run page. Does NOT create a GitHub Release — that's the
# job of release.yml, triggered by pushing a `v*` tag.
#
# Note: this workflow does NOT sign updater artifacts. Manual builds are
# meant for smoke-testing installers; they cannot be served to the
# auto-updater because they have no valid signature. Tauri logs a warning
# during build (because `bundle.createUpdaterArtifacts` is true in
# tauri.conf.json) which is expected and harmless here.

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macos-x64
            rust-target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            name: windows-x64
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splot-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
          if-no-files-found: warn
