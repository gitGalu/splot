name: Build (manual)

# Manual cross-platform build. Produces installer artifacts you can download
# from the workflow run page. Does NOT create a GitHub Release — that's the
# job of release.yml, triggered by pushing a `v*` tag.

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macos-x64
          - platform: ubuntu-22.04
            args: ""
            name: linux-x64
          - platform: windows-latest
            args: ""
            name: windows-x64

          # RPM build inside a Rocky 9 container on an Ubuntu runner.
          # Produces an .rpm that installs cleanly on RHEL 9.x, Rocky 9, AlmaLinux 9.
          - platform: ubuntu-22.04
            args: "--bundles rpm"
            name: linux-rpm
            container: rockylinux:9

    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}
    steps:
      - name: Bootstrap Rocky 9 container
        if: matrix.container == 'rockylinux:9'
        run: |
          dnf install -y epel-release dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf install -y \
            gcc gcc-c++ make file rpm-build \
            git curl wget tar xz \
            openssl-devel \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libsoup3-devel \
            librsvg2-devel \
            patchelf \
            nodejs npm

      - uses: actions/checkout@v4

      - name: Install Linux build dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04' && matrix.container == ''
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && (contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splot-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
          if-no-files-found: warn
