name: Release

# Triggered by pushing a `v*` tag. Builds macOS (arm64 + x64) and Windows
# x64 installers, signs them for the auto-updater, and creates a DRAFT
# GitHub Release with all artifacts attached. You then review and publish
# the draft from the GitHub UI.
#
# Linux .deb / .AppImage / Flatpak builds are intentionally NOT part of this
# workflow. The Splot auto-updater is only wired up for macOS and Windows
# (see src-tauri/src/lib.rs and src-tauri/Cargo.toml). Linux distribution is
# handled outside this pipeline.
#
# For test builds without creating a release, use the "Build (manual)"
# workflow — it produces the same installers as workflow-run downloads
# without signing the updater artifacts.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macos-x64
            rust-target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            name: windows-x64
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app & upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splot ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

  # tauri-action emits its own per-job latest.json, so a matrix run causes
  # them to overwrite each other on the draft. Build the canonical latest.json
  # from the signatures uploaded to the release once all platform jobs are
  # done — that file is what the updater endpoint resolves to.
  publish-updater-manifest:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Build latest.json from release signatures
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.TAG;
            const version = tag.replace(/^v/, "");

            // Drafts created by tauri-action carry a `tag_name` but no real
            // git tag yet, so `getReleaseByTag` 404s. Page through releases
            // and pick the draft (or published, on a re-run) that matches.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              core.setFailed(`No release found for tag ${tag}`);
              return;
            }

            const assets = release.assets;
            const findAsset = (predicate) => assets.find(predicate);

            // Map a Tauri updater target (`darwin-aarch64`, `darwin-x86_64`,
            // `windows-x86_64`) to its installer + signature pair.
            const targets = [
              {
                key: "darwin-aarch64",
                installerRe: /aarch64.*\.app\.tar\.gz$/i,
                sigRe: /aarch64.*\.app\.tar\.gz\.sig$/i,
              },
              {
                key: "darwin-x86_64",
                installerRe: /x64.*\.app\.tar\.gz$|x86_64.*\.app\.tar\.gz$/i,
                sigRe: /x64.*\.app\.tar\.gz\.sig$|x86_64.*\.app\.tar\.gz\.sig$/i,
              },
              {
                key: "windows-x86_64",
                installerRe: /(?:x64|x86_64).*setup\.exe$|(?:x64|x86_64).*\.msi$/i,
                sigRe: /(?:x64|x86_64).*setup\.exe\.sig$|(?:x64|x86_64).*\.msi\.sig$/i,
              },
            ];

            const platforms = {};
            for (const t of targets) {
              const installer = findAsset((a) => t.installerRe.test(a.name));
              const sig = findAsset((a) => t.sigRe.test(a.name));
              if (!installer || !sig) {
                core.warning(`No installer/sig pair for ${t.key} — skipping`);
                continue;
              }
              const sigUrl = sig.browser_download_url;
              const sigBody = await fetch(sigUrl).then((r) => r.text());
              platforms[t.key] = {
                signature: sigBody.trim(),
                url: installer.browser_download_url,
              };
            }

            if (Object.keys(platforms).length === 0) {
              core.setFailed("No platforms resolved — refusing to publish empty latest.json");
              return;
            }

            const manifest = {
              version,
              notes: release.body || "",
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            // Replace any existing latest.json, then upload the freshly built one.
            const existing = assets.find((a) => a.name === "latest.json");
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: "latest.json",
              data: JSON.stringify(manifest, null, 2),
            });

            core.info(`Published latest.json for ${tag} with ${Object.keys(platforms).join(", ")}`);
