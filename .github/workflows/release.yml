name: Release

# Triggered by pushing a `v*` tag. Builds macOS (arm64 + x64) and Windows
# x64 installers, signs them for the auto-updater, and creates a DRAFT
# GitHub Release with all artifacts attached. You then review and publish
# the draft from the GitHub UI.
#
# Linux .deb / .AppImage / Flatpak builds are intentionally NOT part of this
# workflow. The Splot auto-updater is only wired up for macOS and Windows
# (see src-tauri/src/lib.rs and src-tauri/Cargo.toml). Linux distribution is
# handled outside this pipeline.
#
# For test builds without creating a release, use the "Build (manual)"
# workflow — it produces the same installers as workflow-run downloads
# without signing the updater artifacts.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macos-x64
            rust-target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            name: windows-x64
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app & upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splot ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

      # Hand the .sig blobs to the manifest job through workflow artifacts
      # rather than re-downloading them from the draft release. Reading
      # asset bytes through the API has unpredictable redirect/auth quirks;
      # workflow artifacts are the boring, reliable path.
      - name: Upload updater signatures
        uses: actions/upload-artifact@v4
        with:
          name: updater-sigs-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.sig
          if-no-files-found: error
          retention-days: 1

  # tauri-action emits its own per-job latest.json, so a matrix run causes
  # them to overwrite each other on the draft. Build the canonical latest.json
  # from the signatures uploaded to the release once all platform jobs are
  # done — that file is what the updater endpoint resolves to.
  publish-updater-manifest:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download updater signatures
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: updater-sigs-*
          merge-multiple: true

      - name: List signatures
        run: find sigs -type f

      - name: Build & upload latest.json
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const tag = process.env.TAG;
            const version = tag.replace(/^v/, "");
            const repoSlug = `${context.repo.owner}/${context.repo.repo}`;

            // Drafts created by tauri-action carry a `tag_name` but no real
            // git tag yet, so `getReleaseByTag` 404s. Page through releases
            // and pick the one matching our tag.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              core.setFailed(`No release found for tag ${tag}`);
              return;
            }

            // Walk the artifact tree and collect every .sig by basename.
            // Tauri places each in src-tauri/target/<triple>/release/bundle/
            // <bundleType>/, but actions/upload-artifact preserves only the
            // path under the workspace root, so we just recurse.
            const sigs = new Map();
            const walk = (dir) => {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(full);
                else if (entry.name.endsWith(".sig")) sigs.set(entry.name, full);
              }
            };
            walk("sigs");

            // Map Tauri updater target keys to their installer + sig file
            // patterns. Names come from tauri-action's bundling output and
            // line up 1:1 with the release assets uploaded to the draft.
            const targets = [
              {
                key: "darwin-aarch64",
                installerRe: /aarch64.*\.app\.tar\.gz$/i,
                sigRe: /aarch64.*\.app\.tar\.gz\.sig$/i,
              },
              {
                key: "darwin-x86_64",
                installerRe: /x64.*\.app\.tar\.gz$|x86_64.*\.app\.tar\.gz$/i,
                sigRe: /x64.*\.app\.tar\.gz\.sig$|x86_64.*\.app\.tar\.gz\.sig$/i,
              },
              {
                key: "windows-x86_64",
                installerRe: /(?:x64|x86_64).*setup\.exe$|(?:x64|x86_64).*\.msi$/i,
                sigRe: /(?:x64|x86_64).*setup\.exe\.sig$|(?:x64|x86_64).*\.msi\.sig$/i,
              },
            ];

            const platforms = {};
            for (const t of targets) {
              const installer = release.assets.find((a) => t.installerRe.test(a.name));
              const sigEntry = [...sigs.entries()].find(([name]) => t.sigRe.test(name));
              if (!installer || !sigEntry) {
                core.warning(
                  `No installer/sig pair for ${t.key} — installer=${installer?.name}, sig=${sigEntry?.[0]}`,
                );
                continue;
              }
              const sigBody = fs.readFileSync(sigEntry[1], "utf8").trim();
              if (!sigBody.startsWith("untrusted comment:")) {
                throw new Error(
                  `Signature for ${t.key} (${sigEntry[0]}) does not look like minisign output: ` +
                    sigBody.slice(0, 80),
                );
              }
              platforms[t.key] = {
                signature: sigBody,
                // Build the URL from the tag rather than reusing the
                // draft's `browser_download_url` (which contains
                // `untagged-<sha>` and stops resolving once published).
                url: `https://github.com/${repoSlug}/releases/download/${tag}/${installer.name}`,
              };
            }

            if (Object.keys(platforms).length === 0) {
              core.setFailed(
                "No platforms resolved — refusing to publish empty latest.json",
              );
              return;
            }

            const manifest = {
              version,
              notes: release.body || "",
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            // Replace any existing latest.json (left over from a previous
            // run on the same tag), then upload the fresh one.
            const existing = release.assets.find((a) => a.name === "latest.json");
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: "latest.json",
              data: JSON.stringify(manifest, null, 2),
            });

            core.info(
              `Published latest.json for ${tag} with ${Object.keys(platforms).join(", ")}`,
            );
