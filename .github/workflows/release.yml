name: Release

# Triggered by pushing a `v*` tag. Builds for all platforms and creates a
# DRAFT GitHub Release with the installers attached. You then review and
# publish the draft from the GitHub UI.
#
# For test builds without creating a release, use the "Build (manual)"
# workflow — it produces the same artifacts as workflow run downloads.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macos-x64
          - platform: ubuntu-22.04
            args: ""
            name: linux-x64
          - platform: windows-latest
            args: ""
            name: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && (contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app & upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splot ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  flatpak:
    # Built separately because flatpak-builder needs its own container with
    # the GNOME runtime/SDK preinstalled. Output is a single .flatpak bundle
    # that installs on RHEL, Fedora, Ubuntu, openSUSE, etc. — independent of
    # the host's glibc, which is why .AppImage doesn't work on RHEL 9.
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Python helpers
        run: |
          dnf install -y python3-pip git || true
          pip3 install --break-system-packages aiohttp tomlkit toml
          # flatpak-node-generator ships only as a Python package
          # (no standalone script), so install it from the upstream repo.
          pip3 install --break-system-packages \
            "git+https://github.com/flatpak/flatpak-builder-tools.git#subdirectory=node"

      - name: Generate offline cargo sources
        run: |
          curl -L -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 /tmp/flatpak-cargo-generator.py \
            src-tauri/Cargo.lock \
            -o flatpak/cargo-sources.json

      - name: Generate offline node sources
        run: |
          flatpak-node-generator npm package-lock.json \
            -o flatpak/node-sources.json

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: splot.flatpak
          manifest-path: flatpak/info.galu.dev.splot.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Attach Flatpak to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" splot.flatpak --clobber
