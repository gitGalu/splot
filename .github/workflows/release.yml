name: Release

# Triggered by pushing a `v*` tag. Builds macOS (arm64 + x64) and Windows
# x64 installers, signs them for the auto-updater, and creates a DRAFT
# GitHub Release with all artifacts attached. You then review and publish
# the draft from the GitHub UI.
#
# Linux .deb / .AppImage / Flatpak builds are intentionally NOT part of this
# workflow. The Splot auto-updater is only wired up for macOS and Windows
# (see src-tauri/src/lib.rs and src-tauri/Cargo.toml). Linux distribution is
# handled outside this pipeline.
#
# For test builds without creating a release, use the "Build (manual)"
# workflow — it produces the same installers as workflow-run downloads
# without signing the updater artifacts.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            name: macos-arm64
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            name: macos-x64
            rust-target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            name: windows-x64
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app & upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splot ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

      # Hand the .sig blobs to the manifest job through workflow artifacts
      # rather than re-downloading them from the draft release. Reading
      # asset bytes through the API has unpredictable redirect/auth quirks;
      # workflow artifacts are the boring, reliable path.
      - name: Upload updater signatures
        uses: actions/upload-artifact@v4
        with:
          name: updater-sigs-${{ matrix.name }}
          path: |
            src-tauri/target/**/release/bundle/**/*.sig
          if-no-files-found: error
          retention-days: 1

  # tauri-action emits its own per-job latest.json, so a matrix run causes
  # them to overwrite each other on the draft. Build the canonical latest.json
  # from the signatures uploaded to the release once all platform jobs are
  # done — that file is what the updater endpoint resolves to.
  publish-updater-manifest:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download updater signatures
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: updater-sigs-*
          merge-multiple: true

      - name: List signatures
        run: find sigs -type f

      - name: Build & upload latest.json
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const tag = process.env.TAG;
            const version = tag.replace(/^v/, "");
            const repoSlug = `${context.repo.owner}/${context.repo.repo}`;

            // Drafts created by tauri-action carry a `tag_name` but no real
            // git tag yet, so `getReleaseByTag` 404s. Page through releases
            // and pick the one matching our tag.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              core.setFailed(`No release found for tag ${tag}`);
              return;
            }

            // Walk the artifact tree and collect every .sig with its full
            // path. macOS bundles are named just `Splot.app.tar.gz.sig` for
            // both architectures — only the `aarch64-apple-darwin` /
            // `x86_64-apple-darwin` parent directory disambiguates them.
            const sigs = [];
            const walk = (dir) => {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(full);
                else if (entry.name.endsWith(".sig")) sigs.push(full);
              }
            };
            walk("sigs");
            core.info(`Discovered ${sigs.length} .sig files: ${sigs.join(", ")}`);

            // Map each updater target to:
            //  - `installerRe`: matches the asset *name* on the release
            //    (these names ARE arch-tagged: `Splot_aarch64.app.tar.gz`,
            //    `Splot_x64.app.tar.gz`, `Splot_<v>_x64-setup.exe`, …).
            //  - `sigPathRe`: matches the *full path* of the .sig on disk.
            //    macOS .sig basenames are not arch-tagged (`Splot.app.tar.gz.sig`)
            //    — disambiguate via the `aarch64-apple-darwin` /
            //    `x86_64-apple-darwin` parent directory that
            //    upload-artifact preserved.
            const targets = [
              {
                key: "darwin-aarch64",
                installerRe: /aarch64.*\.app\.tar\.gz$/i,
                sigPathRe: /aarch64-apple-darwin\b.*\.app\.tar\.gz\.sig$/i,
              },
              {
                key: "darwin-x86_64",
                installerRe: /(?:x64|x86_64).*\.app\.tar\.gz$/i,
                sigPathRe: /x86_64-apple-darwin\b.*\.app\.tar\.gz\.sig$/i,
              },
              {
                key: "windows-x86_64",
                // Windows builds emit BOTH NSIS (setup.exe) and WiX (.msi)
                // installers with separate signatures. The updater config
                // sets `installMode: passive` for NSIS, so pin to NSIS on
                // both sides — picking installer and sig independently
                // produced a setup.exe URL paired with a .msi signature
                // (different hashes → "signature verification failed" on
                // the user's machine).
                installerRe: /(?:x64|x86_64).*setup\.exe$/i,
                sigPathRe: /(?:x64|x86_64).*setup\.exe\.sig$/i,
              },
            ];

            const platforms = {};
            for (const t of targets) {
              // Use `filter` (not `find`) so an ambiguous regex fails loudly
              // instead of silently picking whichever asset comes first.
              // Mismatched pairs (e.g. setup.exe URL with a .msi signature)
              // ship a broken latest.json that fails verification on the
              // user's machine.
              const installerCandidates = release.assets.filter((a) =>
                t.installerRe.test(a.name),
              );
              const sigCandidates = sigs.filter((p) => t.sigPathRe.test(p));
              if (installerCandidates.length === 0 || sigCandidates.length === 0) {
                core.warning(
                  `No installer/sig pair for ${t.key} — installers=${installerCandidates.length}, sigs=${sigCandidates.length}`,
                );
                continue;
              }
              if (installerCandidates.length > 1) {
                throw new Error(
                  `Ambiguous installer for ${t.key}: ${installerCandidates.map((a) => a.name).join(", ")}`,
                );
              }
              if (sigCandidates.length > 1) {
                throw new Error(
                  `Ambiguous signature for ${t.key}: ${sigCandidates.join(", ")}`,
                );
              }
              const installer = installerCandidates[0];
              const sigPath = sigCandidates[0];
              // Tauri writes .sig files as base64 (decoded body starts with
              // `untrusted comment: …`). The updater reads the file as-is,
              // so latest.json must keep the base64 form. Validate by
              // round-tripping through Buffer.
              const sigBase64 = fs.readFileSync(sigPath, "utf8").trim();
              const sigDecoded = Buffer.from(sigBase64, "base64").toString("utf8");
              if (!sigDecoded.startsWith("untrusted comment:")) {
                throw new Error(
                  `Signature for ${t.key} (${path.basename(sigPath)}) does not decode to ` +
                    `minisign output. Decoded prefix: ${sigDecoded.slice(0, 80)}`,
                );
              }
              platforms[t.key] = {
                signature: sigBase64,
                // Build the URL from the tag rather than reusing the
                // draft's `browser_download_url` (which contains
                // `untagged-<sha>` and stops resolving once published).
                url: `https://github.com/${repoSlug}/releases/download/${tag}/${installer.name}`,
              };
            }

            if (Object.keys(platforms).length === 0) {
              core.setFailed(
                "No platforms resolved — refusing to publish empty latest.json",
              );
              return;
            }

            const manifest = {
              version,
              notes: release.body || "",
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            // Replace any existing latest.json (left over from a previous
            // run on the same tag), then upload the fresh one.
            const existing = release.assets.find((a) => a.name === "latest.json");
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: "latest.json",
              data: JSON.stringify(manifest, null, 2),
            });

            core.info(
              `Published latest.json for ${tag} with ${Object.keys(platforms).join(", ")}`,
            );
